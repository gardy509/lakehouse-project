services:
  rustfs:
    image: rustfs/rustfs:latest
    user: "0:0"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs-data:/data
      - rustfs-logs:/logs
  lab:
    image: python:3.12-slim
    working_dir: /workspace
    depends_on: [rustfs]
    volumes:
      - ./:/workspace
      - ./local-store:/data/local
    environment:
      AWS_ACCESS_KEY_ID: rustfsadmin
      AWS_SECRET_ACCESS_KEY: rustfsadmin
      S3_ENDPOINT: "http://rustfs:9000"
      HF_TOKEN: ${HF_TOKEN:-}
    command: sleep infinity
volumes:
  rustfs-data:
  rustfs-logs:
